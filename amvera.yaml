meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: npm install -g pnpm && node -e "const fs=require('fs');const vars=['OPENAI_API_KEY','OPENAI_MODEL','SUPABASE_SERVICE_ROLE_KEY','GOOGLE_CLIENT_ID','GOOGLE_CLIENT_SECRET','POLZA_AI_API_KEY','YUKASSA_SHOP_ID','YUKASSA_SECRET_KEY','YUKASSA_WEBHOOK_SECRET'];const lines=vars.filter(v=>process.env[v]).map(v=>v+'='+process.env[v]);fs.writeFileSync('.env.local',lines.join('\n'));" && pnpm install --frozen-lockfile && pnpm build

run:
  command: node_modules/.bin/next start
  containerPort: 3000
  persistenceMount: /data
